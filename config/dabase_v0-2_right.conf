CONFIG_BT=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Central side: scan aggressively for lost peripherals
CONFIG_BT_CENTRAL_PREF_MIN_INT=6
CONFIG_BT_CENTRAL_PREF_MAX_INT=12

# Longer supervision timeout so dongle doesn't give up
CONFIG_BT_SUPERVISION_TIMEOUT=400

# Keep scanning for peripherals that come back
CONFIG_BT_BACKGROUND_SCAN=y