CONFIG_BT=y
CONFIG_ZMK_POINTING=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Increase BLE TX power to improve connection reliability between dongle and halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fix split peripheral reconnection after power off/on.
# Disables 2M PHY which is the known cause of "Advertising failed to start (err -69)"
# and peripherals refusing to reconnect to the central/dongle after reboot.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
