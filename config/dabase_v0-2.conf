CONFIG_BT=y
CONFIG_ZMK_POINTING=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Aggressive reconnect on power-on
CONFIG_ZMK_BLE_PERIPHERAL_ADDR_TYPE_RANDOM_STATIC=n

# Keep advertising longer after boot
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Don't go idle too fast before reconnecting
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_SLEEP_TIMEOUT=900000